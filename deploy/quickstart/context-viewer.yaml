---
apiVersion: v1
kind: ConfigMap
metadata:
  name: context-viewer-config
  namespace: otel-backend
data:
  NEXT_PUBLIC_API_BASE_URL: "http://otel-backend.otel-backend.svc.cluster.local:8080/api"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: context-viewer
  namespace: otel-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: context-viewer
  template:
    metadata:
      labels:
        app: context-viewer
    spec:
      containers:
      - name: context-viewer
        image: context-viewer:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: context-viewer-config
              key: NEXT_PUBLIC_API_BASE_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: context-viewer
  namespace: otel-backend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: context-viewer

